<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Color de la barra del navegador acorde al tema oscuro (tinta) por defecto -->
    <meta name="theme-color" content="#0E0F12" />
    <title>SmartPeak</title>
    <!-- Iconos de marca (el "pico" de SmartPeak) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="application-name" content="SmartPeak" />
    <!-- PWA standalone: Android usa mobile-web-app-capable; iOS usa los apple-* -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SmartPeak" />
    <!-- "black": barra opaca negra. El layout NO usa env(safe-area-inset-top)
         (solo bottom), así que "black-translucent" solaparía el header bajo el
         notch. Negro opaco = coherente con el tema oscuro por defecto y sin tapar
         contenido. Nunca "default" (barra blanca, rompe la estética). -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <!-- Tipografía de la marca (igual que la landing): Space Grotesk para la UI,
         Space Mono para los datos/labels técnicos. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
